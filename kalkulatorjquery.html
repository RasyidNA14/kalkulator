<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .kalkulator {
      width: 240px;
    }

    .layar {
      width: 100%;
      margin-bottom: 8px;
    }

    #ekspresi {
      width: 100%;
      font-size: 13px;
      text-align: right;
      padding: 4px;
      box-sizing: border-box;
    }

    #hasil {
      width: 100%;
      font-size: 28px;
      text-align: right;
      padding: 4px;
      box-sizing: border-box;
    }

    .tombol-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    button {
      padding: 12px 0;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-nol {
      grid-column: span 2;
    }
  </style>
  <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
</head>
<body>

<div class="kalkulator">
  <div class="layar">
    <input type="text" id="ekspresi" readonly placeholder=" " />
    <input type="text" id="hasil" readonly value="0" />
  </div>

  <div class="tombol-grid">
    <button data-action="clear">AC</button>
    <button data-action="delete">DEL</button>
    <button data-action="operator" data-value="%">%</button>
    <button data-action="operator" data-value="/">÷</button>

    <button data-action="digit" data-value="7">7</button>
    <button data-action="digit" data-value="8">8</button>
    <button data-action="digit" data-value="9">9</button>
    <button data-action="operator" data-value="*">×</button>

    <button data-action="digit" data-value="4">4</button>
    <button data-action="digit" data-value="5">5</button>
    <button data-action="digit" data-value="6">6</button>
    <button data-action="operator" data-value="-">−</button>

    <button data-action="digit" data-value="1">1</button>
    <button data-action="digit" data-value="2">2</button>
    <button data-action="digit" data-value="3">3</button>
    <button data-action="operator" data-value="+">+</button>

    <button class="btn-nol" data-action="digit" data-value="0">0</button>
    <button data-action="decimal">.</button>
    <button data-action="equals">=</button>
  </div>
</div>

<script>
  let ekspresiSaat = '';
  let hasilSaat    = '0';
  let sudahHitung  = false;

  const $ekspresi = $('#ekspresi');
  const $hasil    = $('#hasil');

  function tampilkan() {
    $ekspresi.val(ekspresiSaat);
    $hasil.val(hasilSaat);
  }

  function inputAngka(angka) {
    if (sudahHitung) {
      ekspresiSaat = angka;
      hasilSaat    = angka;
      sudahHitung  = false;
    } else {
      if (hasilSaat === '0' && angka !== '.') {
        hasilSaat = angka;
      } else {
        hasilSaat += angka;
      }
      ekspresiSaat += angka;
    }
    tampilkan();
  }

  function inputTitik() {
    const bagian        = ekspresiSaat.split(/[\+\-\*\/\%]/);
    const angkaTerakhir = bagian[bagian.length - 1];
    if (angkaTerakhir.includes('.')) return;

    if (sudahHitung) {
      ekspresiSaat = '0.';
      hasilSaat    = '0.';
      sudahHitung  = false;
    } else {
      if (ekspresiSaat === '' || /[\+\-\*\/\%]$/.test(ekspresiSaat)) {
        hasilSaat    += '0.';
        ekspresiSaat += '0.';
      } else {
        hasilSaat    += '.';
        ekspresiSaat += '.';
      }
    }
    tampilkan();
  }

  function inputOperator(op) {
    sudahHitung = false;
    if (/[\+\-\*\/\%]$/.test(ekspresiSaat)) {
      ekspresiSaat = ekspresiSaat.slice(0, -1) + op;
    } else {
      ekspresiSaat += op;
    }
    const simbolMap = { '*': '×', '/': '÷', '+': '+', '-': '−', '%': '%' };
    hasilSaat = simbolMap[op] || op;
    tampilkan();
  }

  function hitung() {
    if (ekspresiSaat === '' || /[\+\-\*\/\%]$/.test(ekspresiSaat)) return;
    try {
      const expr       = ekspresiSaat;
      const hasilAngka = new Function('return ' + expr)();
      hasilSaat        = isFinite(hasilAngka)
        ? parseFloat(hasilAngka.toFixed(10)).toString()
        : 'Error';
      ekspresiSaat = expr + ' =';
      sudahHitung  = true;
    } catch (e) {
      hasilSaat    = 'Error';
      ekspresiSaat = '';
    }
    tampilkan();
  }

  function hapusSemua() {
    ekspresiSaat = '';
    hasilSaat    = '0';
    sudahHitung  = false;
    tampilkan();
  }

  function hapusSatu() {
    if (sudahHitung) { hapusSemua(); return; }
    ekspresiSaat = ekspresiSaat.slice(0, -1);
    hasilSaat    = ekspresiSaat === '' ? '0' : ekspresiSaat;
    tampilkan();
  }

  $('.tombol-grid').on('click', 'button', function() {
    const action = $(this).data('action');
    const value  = $(this).data('value');

    if (action === 'digit')        inputAngka(value);
    else if (action === 'decimal')  inputTitik();
    else if (action === 'operator') inputOperator(value);
    else if (action === 'equals')   hitung();
    else if (action === 'clear')    hapusSemua();
    else if (action === 'delete')   hapusSatu();
  });

  $(document).on('keydown', function(e) {
    const k = e.key;
    if (k >= '0' && k <= '9')                   inputAngka(k);
    else if (k === '.')                          inputTitik();
    else if (['+','-','*','/','%'].includes(k))  inputOperator(k);
    else if (k === 'Enter' || k === '=')         hitung();
    else if (k === 'Backspace') {
      e.preventDefault();
      hapusSatu();
    } else if (k === 'Escape')                   hapusSemua();
  });
</script>
</body>
</html>
